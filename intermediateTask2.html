<!DOCTYPE html>
<html lang="en">

<body>
    <div>
        <p>Intermediate Task 2</p>
    </div>


    <script>
        // Prompt the user for a number either on a form input or the terminal. 
        // Depending on whether the number is even or odd, 
        // display  either “odd” or “even” to the user.
        // Hint: how does an even / odd number react differently when divided by 2?
        // Extras:
        // If the number is a multiple of 4, print out “divisible by 4”.

        let numb = Number(prompt("Enter a number: "))

        if(numb % 4 == 0){
            console.log("The number is divisible by 4")
        }else if(numb % 2 == 0){
            console.log("The number is even")
        }else{
            console.log("The number is odd")
        }

    </script>
</body>
</html>
