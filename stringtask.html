<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <p>String Task</p>
    </div>

    <script>
//    Clean up the following variable to give the clean version in lower case. 
// Using inbuilt methods in the string class
// f_name = “  JOHn  .“ to “john”
        let f_name = "  JOHn  ."
        f_name=f_name.replace("."," ")
        f_name=f_name.trim()
        console.log(f_name.toLowerCase())
// Slice the below string to get you the resulting sentence:
// sentence_one = “The Dog Breed is German Shepherd” only display “Breed is German”
        let sentence_one = "The Dog Breed is German Shepherd"
        sentence_one=sentence_one.slice(8,23)
        console.log(sentence_one)
// sentence_two = “Defeats for the Clinton forces, this was her moment of triumph” 
// only display “Clinton forces”
        let sentence_two="Defeats for the Clinton forces, this was her moment of triumph"
        sentence_two=sentence_two.slice(16,31)
        console.log(sentence_two)
// Split the below sentence using a semicolon i.e ; And display length of the result. 
// “The lazy dog; ran so fast; it hit the wall.” 
        let sent="The lazy dog; ran so fast; it hit the wall."
        sent=sent.split(";")
        console.log(sent.length)

    </script>
</body>
</html>
