    <script>
    // Write a program that calculates the total stock in a company from the 
    // array/list below if we know that the stock is the last digit in every array/list.
    // prods = [[‘omo’,’30kshs’,’300’], [‘milk’,’50kshs’,’200’],
    // [‘bread’,’45kshs’,’359’], [‘coffee’,’5kshs’,’79’]]
    // NB: ONCE YOU COPY AND PASTE THE LIST ABOVE,
    // REWRITE THE SINGLE QUOTES AS THE ABOVE LIST WILL GIVE YOU AN ERROR.

    let prods = [['omo','30kshs','300'], 
                 ['milk','50kshs','200'],
                 ['bread','45kshs','359'], 
                 ['coffee','5kshs','79']]

    let total_stock=0
    //Define total_stock before looping

    for(i=0; i < prods.length; i++){
        total_stock=total_stock + Number(prods[i][2])
    }
    console.log(total_stock) //938

    // prods[i] → each sub-array
    // prods[i][2] → the last item (stock)


    </script>
