<body>
    <div>
        <p>Intermediate Task 4</p>

    <script>
        // Write a program which accepts email as form input or from terminal. 
        // Validate the email by checking if it's a valid email. 
        // Hint: Check if it contains an “@” symbol and “.” symbol.

        let mail = prompt("Enter your email: ")

        if(mail.includes("@") && mail.includes(".")){
            console.log(mail + " is a valid email")
        }else{
            console.log(mail + " is not a valid email")
        }

    </script>
    
</body>
